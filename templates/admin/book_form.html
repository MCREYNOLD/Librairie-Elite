{% extends "base.html" %}
{% block title %}{{ 'Modifier' if book else 'Nouveau' }} livre — Admin{% endblock %}
{% block content %}
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-brand">⚙️ Admin</div>
    <nav class="admin-nav">
      <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link">📊 Dashboard</a>
      <a href="{{ url_for('admin.books') }}" class="admin-nav-link active">📚 Livres</a>
      <a href="{{ url_for('admin.categories') }}" class="admin-nav-link">🏷️ Catégories</a>
      <a href="{{ url_for('admin.users') }}" class="admin-nav-link">👥 Utilisateurs</a>
      <a href="{{ url_for('admin.orders') }}" class="admin-nav-link">📦 Commandes</a>
      <a href="{{ url_for('main.index') }}" class="admin-nav-link">← Site</a>
    </nav>
  </aside>
  <div class="admin-main">
    <h1 class="admin-title">{{ 'Modifier' if book else 'Nouveau livre' }}</h1>
    <div class="admin-card form-card">
      <form method="post" enctype="multipart/form-data">
        <div class="form-row-2">
          <div class="form-group"><label>Titre *</label><input type="text" name="titre" required value="{{ book.titre if book }}"/></div>
          <div class="form-group"><label>Auteur *</label><input type="text" name="auteur" required value="{{ book.auteur if book }}"/></div>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Catégorie *</label>
            <select name="category_id" required>
              {% for cat in categories %}<option value="{{ cat.id }}" {{ 'selected' if book and book.category_id == cat.id }}>{{ cat.nom }}</option>{% endfor %}
            </select>
          </div>
          <div class="form-group"><label>Prix (€) *</label><input type="number" name="prix" required step="0.01" min="0" value="{{ book.prix if book }}"/></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Stock *</label><input type="number" name="stock" required min="0" value="{{ book.stock if book else 0 }}"/></div>
          <div class="form-group"><label>ISBN</label><input type="text" name="isbn" value="{{ book.isbn if book }}"/></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Éditeur</label><input type="text" name="editeur" value="{{ book.editeur if book }}"/></div>
          <div class="form-group"><label>Année</label><input type="number" name="annee" value="{{ book.annee if book }}"/></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Pages</label><input type="number" name="pages" value="{{ book.pages if book }}"/></div>
          <div class="form-group"><label>Langue</label><input type="text" name="langue" value="{{ book.langue if book else 'Français' }}"/></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Badge</label><input type="text" name="badge" placeholder="Bestseller, Nouveau…" value="{{ book.badge if book }}"/></div>
          <div class="form-group"><label>Couleur couverture</label><input type="color" name="couleur" value="{{ book.couleur if book else '#2D4A8A' }}"/></div>
        </div>
        <div class="form-group"><label>Description</label><textarea name="description" rows="4">{{ book.description if book }}</textarea></div>
        <div class="form-group"><label>Image de couverture</label><input type="file" name="couverture" accept="image/*"/></div>
        <label class="checkbox-label"><input type="checkbox" name="is_featured" {{ 'checked' if book and book.is_featured }}/> Mettre en avant sur la page d'accueil</label>
        <div class="form-actions">
          <button type="submit" class="btn-primary">{{ 'Mettre à jour' if book else 'Créer le livre' }}</button>
          <a href="{{ url_for('admin.books') }}" class="btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
