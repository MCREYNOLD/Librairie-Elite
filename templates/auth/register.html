{% extends "base.html" %}
{% block title %}Créer un compte — Librairie Élite{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Librairie<span>Élite</span></div>
      <h1>Créer un compte</h1>
      <p>Rejoignez notre communauté de lecteurs</p>
    </div>
    <form method="post" class="auth-form">
      <div class="form-row-2">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" name="prenom" required placeholder="Marie"/>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" name="nom" required placeholder="Dupont"/>
        </div>
      </div>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" name="email" required placeholder="vous@exemple.com"/>
      </div>
      <div class="form-group">
        <label>Mot de passe <span class="form-hint">(8 caractères minimum)</span></label>
        <input type="password" name="password" required placeholder="••••••••" minlength="8"/>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="password2" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-auth">Créer mon compte</button>
    </form>
    <p class="auth-switch">Déjà un compte ? <a href="{{ url_for('auth.login') }}">Se connecter</a></p>
  </div>
</div>
{% endblock %}
