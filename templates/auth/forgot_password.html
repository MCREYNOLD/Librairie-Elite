{% extends "base.html" %}
{% block title %}Mot de passe oublié — Librairie Élite{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Librairie<span>Élite</span></div>
      <h1>Mot de passe oublié</h1>
      <p>Entrez votre email pour recevoir un lien de réinitialisation</p>
    </div>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" name="email" required placeholder="vous@exemple.com" autocomplete="email"/>
      </div>
      <button type="submit" class="btn-auth">Envoyer le lien</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← Retour à la connexion</a></p>
  </div>
</div>
{% endblock %}
