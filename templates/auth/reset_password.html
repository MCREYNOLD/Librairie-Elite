{% extends "base.html" %}
{% block title %}Nouveau mot de passe — Librairie Élite{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Librairie<span>Élite</span></div>
      <h1>Nouveau mot de passe</h1>
      <p>Choisissez un mot de passe sécurisé</p>
    </div>
    <form method="post" class="auth-form">
      <div class="form-group">
        <label>Nouveau mot de passe <span class="form-hint">(8 caractères minimum)</span></label>
        <input type="password" name="password" required placeholder="••••••••" minlength="8"/>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="password2" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-auth">Mettre à jour</button>
    </form>
  </div>
</div>
{% endblock %}
