{% extends "base.html" %}
{% block title %}Mon profil — Librairie Élite{% endblock %}
{% block content %}
<div class="page-container">
  <h1 class="page-title">Mon profil</h1>
  <div class="profile-grid">
    <div class="profile-card">
      <h2>Informations personnelles</h2>
      <form method="post" class="auth-form">
        <div class="form-row-2">
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" value="{{ current_user.prenom }}" required/>
          </div>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" value="{{ current_user.nom }}" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" value="{{ current_user.email }}" disabled/>
        </div>
        <div class="form-group">
          <label>Membre depuis</label>
          <input type="text" value="{{ current_user.created_at.strftime('%d/%m/%Y') }}" disabled/>
        </div>
        <button type="submit" class="btn-primary">Enregistrer</button>
      </form>
    </div>
    <div class="profile-card">
      <h2>Mes commandes récentes</h2>
      {% set orders = current_user.orders.order_by_desc_limit(5) if false else [] %}
      <a href="{{ url_for('orders.my_orders') }}" class="btn-secondary">Voir toutes mes commandes →</a>
    </div>
  </div>
</div>
{% endblock %}
