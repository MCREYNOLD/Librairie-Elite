# ============================================================
#  Configuration Apache VirtualHost — Librairie Élite
#  À copier dans :
#    Linux  : /opt/lampp/etc/extra/httpd-vhosts.conf
#    Mac    : /Applications/XAMPP/xamppfiles/etc/extra/httpd-vhosts.conf
#
#  Puis activer dans httpd.conf en décommentant :
#    Include etc/extra/httpd-vhosts.conf
# ============================================================

<VirtualHost *:80>
    ServerName librairie.local
    ServerAlias www.librairie.local

    # ── Chemin absolu vers le dossier du projet ──────────────
    # ADAPTER CE CHEMIN selon où vous avez mis le projet
    Define PROJ /opt/lampp/htdocs/librairie

    # ── WSGI ─────────────────────────────────────────────────
    WSGIDaemonProcess librairie \
        python-path=${PROJ} \
        python-home=${PROJ}/venv \
        processes=2 \
        threads=5 \
        display-name=%{GROUP}

    WSGIProcessGroup  librairie
    WSGIScriptAlias / ${PROJ}/wsgi.py

    # ── Fichiers statiques servis directement par Apache ─────
    Alias /static ${PROJ}/static

    <Directory ${PROJ}/static>
        Require all granted
        Options -Indexes
    </Directory>

    # ── Accès au dossier projet ───────────────────────────────
    <Directory ${PROJ}>
        <Files wsgi.py>
            Require all granted
        </Files>
        Options -Indexes
    </Directory>

    # ── Uploads ───────────────────────────────────────────────
    Alias /uploads ${PROJ}/static/uploads

    <Directory ${PROJ}/static/uploads>
        Require all granted
        Options -Indexes
    </Directory>

    # ── Logs ─────────────────────────────────────────────────
    ErrorLog  /opt/lampp/logs/librairie_error.log
    CustomLog /opt/lampp/logs/librairie_access.log combined

</VirtualHost>
